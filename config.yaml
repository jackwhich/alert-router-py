server:
  host: 0.0.0.0
  port: 9600

logging:
  log_dir: "logs"
  log_file: "alert-router.log"
  level: "INFO"
  max_bytes: 10485760
  backup_count: 5

# 全局代理开关（控制是否使用代理）
# true: 启用代理（默认）
# false: 禁用代理（所有渠道都不使用代理）
proxy_enabled: true

proxy:
  http: "socks5://x.8.x.x:33080"
  https: "socks5://x.8.x.x:33080"

# Prometheus 告警图片渲染（兼容 VictoriaMetrics：填 VM 的查询地址即可）
prometheus_image:
  enabled: true
  # 数据源地址，请求时会拼上 /api/v1/query_range。若用 VictoriaMetrics 替代 Prometheus：
  # - 集群 vmselect：必须带 path，例如 http://<vmselect>:8481/select/0/prometheus（否则会 400）
  # - 单机：http://<主机>:8428
  # 原 Prometheus：http://prometheus:9090。留空则从告警 generatorURL 解析。
  # 告警来自 vmalert 时，默认 generatorURL 无 g0.expr，无法出图。需在 vmalert 启动参数中配置：
  #   -external.url=http://<vmalert 或 VM 地址>:8880
  #   -external.alert.source=graph?g0.expr={{.Expr|queryEscape}}
  # 详见 monitoring-stack/vmalert/config/vmalert.yml 或下方「vmalert 出图配置」说明。
  prometheus_url: "http://x.x.x.x:9090"
  # 图片生成是否使用代理（默认 false，因为 Prometheus 通常是内网地址）
  # 绘图引擎选择: "plotly" (推荐，更美观) 或 "matplotlib" (传统，兼容性好)
  # 如果选择 plotly 但未安装，会自动回退到 matplotlib
  plot_engine: "matplotlib"
  use_proxy: false
  lookback_minutes: 15
  step: "30s"
  timeout_seconds: 8
  max_series: 8
  # 图例标签白名单：仅以下 label 会显示在趋势图图例中，不在此列表的一律不显示（便于统一控制）
  # 不配置则使用代码内默认：pod, container, device, mountpoint, fstype, instance, topic, consumergroup, service_name, jenkins_job, build_number, name, endpoint, node
  legend_label_whitelist:
    # K8s/容器
    - pod
    - container
    - namespace
    - deployment
    - statefulset
    - daemonset
    - job_name
    - horizontalpodautoscaler
    - persistentvolumeclaim
    - persistentvolume
    - phase
    # 节点/磁盘
    - device
    - mountpoint
    - fstype
    - instance
    - node
    # Kafka（积压/分区数/broker/副本 等）
    - topic
    - consumergroup
    - name
    - address
    # RocketMQ（积压/消费延时/broker/TPS 等）
    - group
    - broker
    - brokerIP
    - cluster
    - env
    # RPC/服务/Dubbo/Hikaricp
    - service_name
    - endpoint
    - application
    # Jenkins
    - jenkins_job
    - build_number
    # Nginx（4XX/5XX/uri/源IP 等）
    - server_name
    - status
    - uri
    - request_uri
    - remote_addr
    - url
    # Prometheus/Alertmanager
    - alertmanager
    - remote_name
    - controller
    - resource
    # Nacos（节点宕机/CPU 等，nacos_monitor 用 name、kubernetes_namespace）
    - kubernetes_namespace
    # 通用/TargetDown 等
    - service
# Grafana 告警图片渲染
grafana_image:
  enabled: false
  # Grafana 地址，例如: http://grafana:3000（可选，如果未配置会从 generatorURL 自动提取）
  # 用于调用 Grafana 渲染服务生成图片（需要 Grafana 配置了渲染服务）
  grafana_url: "http://x.x.x.x:xxxx"
  grafana_api_token:  "xxxxxxxx"
  # Prometheus API 地址，例如: http://prometheus:9090（可选，仅当 Grafana 使用 Prometheus 数据源时需要）
  # 如果未配置，将使用 Grafana 渲染服务生成图片
  # prometheus_url: ""
  # 图�����生成是否使用代理（默认 false，因为 Grafana/Prometheus 通常是内网地址）
  use_proxy: false
  lookback_minutes: 15
  step: "30s"
  timeout_seconds: 8
  max_series: 8

jenkins_dedup:
  enabled: true
  ttl_seconds: 900
  clear_on_resolved: true

# Grafana 告警去重：同一告警（fingerprint+状态）在窗口内只发一次，避免重复两条
grafana_dedup:
  enabled: true
  ttl_seconds: 90
  clear_on_resolved: true

defaults:
  title_prefix: "[ALERT]"
  dashboard_fallback: ""
  runbook_fallback: ""

# 渠道配置说明：命名规范 = 来源_渠道_用途
# - 来源：prometheus、grafana（谁发的告警）
# - 渠道：telegram、slack（发到哪里）
# - 用途：default、critical、warning、jenkins 等

channels:
  # Prometheus 告警渠道
  prometheus_telegram_default:
    type: telegram
    enabled: true
    image_enabled: true
    bot_token: "xxxxx:xxxxx-xxxxxx"
    chat_id: "-xxxxxx"
    template: "prometheus_telegram.html.j2"

  prometheus_telegram_critical:
    type: telegram
    enabled: false
    image_enabled: false
    bot_token: "123456:AAxxxx"
    chat_id: "-xxxxx"
    template: "prometheus_telegram.html.j2"

  prometheus_slack:
    type: slack
    enabled: true
    image_enabled: true
    webhook_url: "https://hooks.slack.com/services/Txxxxxxxxx/xxxxxx"
    template: "prometheus_slack.json.j2"

  # Grafana 告警渠道
  grafana_telegram_default:
    type: telegram
    enabled: true
    image_enabled: false
    bot_token: "8502571186:AAFqy849KL-xxxxxxx"
    chat_id: "-xxxxx"
    template: "grafana_telegram.html.j2"

  # 提币监控告警-人工审核告警-订单进入人工审核
  grafana_risk_withdrawal_order_telegram_default:
    type: telegram
    enabled: true
    image_enabled: false
    bot_token: "xxxxx:AAFqy849KL-YdNykyE7KcPvYpoCRpNYH4Mc"
    chat_id: "-xxx"
    template: "grafana_telegram.html.j2"

  grafana_telegram_critical:
    type: telegram
    enabled: false
    image_enabled: false
    bot_token: "xxxx:xxxxx"
    chat_id: "-51345xxx33386"
    template: "grafana_telegram.html.j2"

  grafana_slack:
    type: slack
    enabled: false
    webhook_url: "https://hooks.slack.com/services/T000/B000/YYY"
    template: "grafana_slack.json.j2"

  # Jenkins 告警渠道
  prometheus_telegram_jenkins:
    # Jenkins 渠道关闭趋势图
    # Jenkins 告警只发送 firing，不发送 resolved
    type: telegram
    enabled: true
    image_enabled: false
    bot_token: "xxxx:xx-xxxxx"
    chat_id: "-xxxxx"
    template: "prometheus_telegram_jenkins.html.j2"
    send_resolved: false

# 路由：先识别来源（Grafana version 1 / Prometheus version 4），再按 _receiver、alertname、severity/级别 匹配；支持中文（如 "严重"、"灾难"）；无匹配则不发送
routing:
  - match:
      _receiver: "Prometheus"
    send_to: ["prometheus_telegram_default"]

  - match:
      _receiver: "Prometheus"
      alertname: "^(?!Jenkins|jenkins).*"
      severity: "critical|灾难"
    send_to: ["prometheus_telegram_critical"]

  - match:
      _receiver: "prod-ebpay"
    send_to: ["prometheus_slack"]

  - match:
      _receiver: "prod_ebpay_jenkins_alarm"
      alertname: ".*Jenkins.*|.*jenkins.*"
    send_to: ["prometheus_telegram_jenkins"]

  - match:
      _receiver: "Withdrawal_Monitoring_Review_Manual_Review_Orders_Entering_Manual_Review"
    send_to: ["grafana_risk_withdrawal_order_telegram_default"]
